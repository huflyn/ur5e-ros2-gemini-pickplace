#VRML_SIM R2025a utf8

PROTO Klemmbaustein_4x2 [
  field SFVec3f    translation  0 0 0
  field SFRotation rotation     0 0 1 0
  field SFString   name         "Klemmbaustein_4x2"
  field SFColor    color        1 0 0       # Standard: Rot
  field SFFloat    mass         0.005       # 5 Gramm hat ein Stein dieser Größe ungefähr
]
{
  Solid {
    translation IS translation
    rotation IS rotation
    name IS name

    children [
      # --- VISUALISIERUNG (CAD) ---
      Transform {
      # Skalierung 0.01 korrigiert cm zu m (Faktor 100)
      scale 0.01 0.01 0.01  
      
      children [
        Shape {
          appearance PBRAppearance {
            baseColor IS color
            roughness 0.5
            metalness 0.1
          }
          geometry Mesh {
            url [ "../meshes/Klemmbaustein_4x2.obj" ]
          }
        }
      ]
    }
  ]

    # --- PHYSIK (Performance & Stabilität) ---
    # Verwenden Sie NICHT das Mesh für die Physik, wenn es eine einfache Box ist.
    # Das spart Rechenzeit und verhindert Hängenbleiben.
    boundingObject Group {
        children [
            # Hauptkörper
            Transform {
                # Ggf. Offset anpassen, falls CAD-Ursprung nicht mittig ist
                translation 0 0 0.0057
                rotation 0 0 1 1.5708
                children [
                    Box { size 0.0318 0.0158 0.01140 }
                ]
            }
            # Optional: Wenn Interlocking simuliert werden MUSS,
            # fügen Sie hier Zylinder für die Noppen hinzu.
            # Für reines Pick & Place reicht die Box oben.
        ]
    }

    # 3. Physik definieren
    physics Physics {
      density -1        # Wichtig: Signalisiert "Benutze Masse statt Dichte"
      mass IS mass
    }
    
  }
}